specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: VictoriaMetrics
providerId: victoriametrics
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- Database
- Time-Series
- Monitoring
- Open Source
- Prometheus
- Plans
- Pricing
description: >-
  VictoriaMetrics ships in two editions: open-source Community (Apache 2.0) and
  Enterprise (commercial license, additional features such as vmanomaly,
  downsampling, multi-tenancy quotas, audit logs, official support and SLA).
  The fully-managed VictoriaMetrics Cloud is also offered. Public list pricing
  is not advertised; quotes are by sales / private offers.
notes: >-
  Public pages do not enumerate Enterprise list prices; trial licenses are
  free. Numeric pricing remains unreconciled.
sources:
- https://victoriametrics.com/products/enterprise/
- https://victoriametrics.com/products/enterprise/trial/
- https://victoriametrics.com/products/cloud/
- https://github.com/VictoriaMetrics/VictoriaMetrics/blob/master/LICENSE
plans:
- id: victoriametrics-community
  name: VictoriaMetrics Community
  type: free
  description: Apache 2.0 open-source single-node and cluster components (vminsert, vmselect, vmstorage, vmagent, vmalert, vmctl). Free to download and self-host.
  entries:
  - label: Open source
    name: oss
    type: flat
    metric: license
    limit: -1
    timeFrame: perpetual
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
- id: victoriametrics-enterprise-trial
  name: Enterprise Trial
  type: free
  description: Free trial license for VictoriaMetrics Enterprise (vmanomaly, downsampling, multitenancy quotas, audit logs, MicroTime, Hot Standby).
  entries:
  - label: Trial license
    name: trial
    type: flat
    metric: license
    limit: -1
    timeFrame: trial
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
- id: victoriametrics-enterprise
  name: VictoriaMetrics Enterprise
  type: enterprise
  description: Commercial self-hosted license. Adds enterprise features, official support, SLAs.
  entries:
  - label: Custom contract
    name: enterprise_contract
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
- id: victoriametrics-cloud
  name: VictoriaMetrics Cloud
  type: subscription
  description: Fully-managed VictoriaMetrics on AWS / GCP. Tiered by ingestion rate and active series; consumption-based billing.
  entries:
  - label: Managed
    name: managed
    type: usage
    metric: ingestion_rate
    limit: -1
    timeFrame: month
    geo: AWS, GCP
    unit: 1
    price: see https://victoriametrics.com/products/cloud/
    userMultiplied: false
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
