aid: victoriametrics
url: https://raw.githubusercontent.com/api-evangelist/victoriametrics/refs/heads/main/apis.yml
name: VictoriaMetrics
kind: company
description: VictoriaMetrics is a fast open-source time-series database and monitoring
  solution. It exposes a Prometheus-compatible HTTP query API, a wide range of ingestion
  endpoints (Prometheus remote-write, InfluxDB Line Protocol, DataDog v1/v2, Graphite,
  OpenTSDB, CSV, JSON, native), a federation endpoint and admin endpoints. The commercial
  Enterprise edition adds anomaly detection (vmanomaly), downsampling, multi-tenancy
  and other features.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Database
- Time-Series
- Monitoring
- Open Source
- Prometheus
- PromQL
- MetricsQL
- Observability
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
- aid: victoriametrics:prometheus-query
  name: VictoriaMetrics Prometheus-Compatible Query API
  description: Prometheus-compatible HTTP API for instant and range queries (PromQL
    / MetricsQL), label discovery, series search, metadata and TSDB status. Single-node
    default port 8428; in cluster mode served by vmselect on port 8481 under /select/<accountID>/prometheus/.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.victoriametrics.com/url-examples/
  baseURL: http://<host>:8428
  tags:
  - REST
  - Prometheus
  - PromQL
  - MetricsQL
  - Query
  properties:
  - type: Documentation
    url: https://docs.victoriametrics.com/
  - type: APIReference
    url: https://docs.victoriametrics.com/url-examples/
  - type: PromQLCompat
    url: https://docs.victoriametrics.com/keyConcepts.html#metricsql
  - url: graphql/victoriametrics-graphql.md
    type: GraphQL
- aid: victoriametrics:ingestion
  name: VictoriaMetrics Ingestion APIs
  description: Multi-protocol ingestion — Prometheus remote-write (/api/v1/write),
    InfluxDB line protocol (/write or /insert/0/influx/write), DataDog v1 (/datadog/api/v1/series)
    and v2 (/datadog/api/v2/series), Graphite (TCP 2003 or /graphite endpoints), OpenTSDB
    (TCP 4242 or /api/put), CSV/JSON/ native /api/v1/import.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.victoriametrics.com/#how-to-import-time-series-data
  baseURL: http://<host>:8428
  tags:
  - REST
  - Ingestion
  - Remote Write
  - InfluxDB
  - DataDog
  - Graphite
  - OpenTSDB
  properties:
  - type: Documentation
    url: https://docs.victoriametrics.com/#how-to-import-time-series-data
- aid: victoriametrics:admin
  name: VictoriaMetrics Admin / Federation API
  description: Administrative endpoints for time-series deletion (/api/v1/admin/tsdb/
    delete_series), data export/import (/api/v1/export, /api/v1/import in various
    formats), Prometheus federation (/federate), TSDB stats and metadata.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.victoriametrics.com/#how-to-delete-time-series
  baseURL: http://<host>:8428
  tags:
  - REST
  - Admin
  - Federation
  - Export
- aid: victoriametrics:vmanomaly
  name: VictoriaMetrics Anomaly Detection (vmanomaly)
  description: Enterprise-only ML-driven anomaly detection. Reads via Prometheus query
    API, writes anomaly scores back via Prometheus remote-write. Multivariate models,
    confidence intervals and HA deployment supported.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.victoriametrics.com/anomaly-detection/
  baseURL: http://<host>:8490
  tags:
  - Enterprise
  - Anomaly Detection
  - ML
  - Prometheus
  properties:
  - type: Documentation
    url: https://docs.victoriametrics.com/anomaly-detection/
